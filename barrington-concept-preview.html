<style>
  :root{
    --chrome-bg:#171b26; --chrome-bg-2:#1f2533; --chrome-line:#2c3344;
    --chrome-text:#e7eaf0; --chrome-muted:#9aa3b5; --chrome-faint:#6b7280;
    --accent:#7cc4e6; --accent-2:#c9a84c;
    --on-brand:#5fb98a; --off-brand:#c9a84c;
    --stage:#10131b;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{display:flex;flex-direction:column;height:100vh;background:var(--stage);font-family:var(--font);color:var(--chrome-text);overflow:hidden;}

  /* ===== Top chrome ===== */
  header.shell{flex:none;background:var(--chrome-bg);border-bottom:1px solid var(--chrome-line);}
  .bar{display:flex;align-items:center;gap:20px;padding:10px 18px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;line-height:1.15;margin-right:6px;}
  .brand b{font-size:.92rem;letter-spacing:.02em;}
  .brand span{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--chrome-muted);}

  .seg{display:flex;background:var(--chrome-bg-2);border:1px solid var(--chrome-line);border-radius:8px;padding:3px;gap:2px;}
  .seg button{appearance:none;background:none;border:none;color:var(--chrome-muted);font:inherit;font-size:.78rem;font-weight:500;
    padding:7px 14px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s;letter-spacing:.01em;}
  .seg button:hover{color:var(--chrome-text);}
  .seg button[aria-selected="true"],.seg button.active{background:var(--accent);color:#0b1118;font-weight:600;}
  .seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .spacer{flex:1 1 auto;}
  .right{display:flex;align-items:center;gap:14px;}
  .vp .ico{width:14px;height:14px;vertical-align:-2px;margin-right:5px;}
  .linkbtn{appearance:none;background:var(--chrome-bg-2);border:1px solid var(--chrome-line);color:var(--chrome-text);
    font:inherit;font-size:.76rem;font-weight:500;padding:8px 14px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:border-color .15s,background .15s;}
  .linkbtn:hover{border-color:var(--accent);}
  .linkbtn svg{width:14px;height:14px;}

  /* secondary row: variant chips + direction note */
  .subbar{display:flex;align-items:center;gap:16px;padding:0 18px 11px;flex-wrap:wrap;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{appearance:none;border:1px solid var(--chrome-line);background:var(--chrome-bg-2);color:var(--chrome-muted);
    font:inherit;font-size:.76rem;padding:7px 13px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s;}
  .chip:hover{color:var(--chrome-text);border-color:#3a4255;}
  .chip .tag{font-size:.64rem;font-weight:700;letter-spacing:.06em;color:var(--chrome-faint);}
  .chip[aria-pressed="true"]{background:#fff;color:#10131b;border-color:#fff;}
  .chip[aria-pressed="true"] .tag{color:#5a6275;}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .chip .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .dot.A{background:var(--off-brand);}
  .dot.B{background:var(--on-brand);}

  .note{display:flex;align-items:center;gap:9px;font-size:.74rem;color:var(--chrome-muted);}
  .badge{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:5px;}
  .badge.A{background:rgba(201,168,76,.15);color:var(--off-brand);border:1px solid rgba(201,168,76,.35);}
  .badge.B{background:rgba(95,185,138,.15);color:var(--on-brand);border:1px solid rgba(95,185,138,.35);}
  .pair{display:inline-flex;align-items:center;gap:6px;margin-left:4px;padding-left:11px;border-left:1px solid var(--chrome-line);
    font-size:.72rem;color:var(--chrome-faint);}
  .pair b{color:var(--chrome-muted);font-weight:600;}
  .pair .lk{font-size:.66rem;letter-spacing:.04em;text-transform:uppercase;color:var(--chrome-faint);}

  /* ===== Stage ===== */
  .stage{flex:1 1 auto;min-height:0;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:0;background:var(--stage);}
  .stage.framed{padding:22px;align-items:flex-start;}
  .device{position:relative;width:100%;height:100%;background:#fff;transition:width .25s ease;}
  .stage.framed .device{height:calc(100% - 0px);border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.5);overflow:hidden;border:1px solid #2c3344;}
  iframe#view{width:100%;height:100%;border:0;display:block;background:#fff;}

  .dims{position:absolute;top:-19px;left:0;font-size:.66rem;color:var(--chrome-faint);letter-spacing:.08em;}
  .stage:not(.framed) .dims{display:none;}

  @media (max-width:760px){
    .brand{display:none;}
    .bar{gap:12px;}
  }
</style>
</head>

  <style>
    :root {
      /* === Premium palette — warm neutrals + deep ink + champagne === */
      --ink:        #20264f;  /* Barrington Blue, deepened — used as ink accent, not surface */
      --ink-soft:   #3a4170;
      --champagne:  #b08d57;  /* refined warm gold accent */
      --champagne-dk:#94733f;
      --ivory:      #faf7f1;  /* primary warm base */
      --ivory-dk:   #f1ece1;  /* alt section */
      --stone:      #e7e0d3;  /* hairlines, borders */
      --cream:      #ffffff;
      --text:       #2c2a26;  /* warm near-black */
      --text-muted: #6f6a60;  /* warm muted */
      --baby-blue:  #92c5ea;  /* retained from brand, very sparing */

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Raleway', sans-serif;

      --maxw: 1240px;
      --space-sm:1rem; --space-md:1.5rem; --space-lg:2.5rem; --space-xl:5rem; --space-2xl:8rem;
      --radius: 2px; /* near-square — refined, not playful */
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-body);color:var(--text);background:var(--ivory);font-size:1.0625rem;line-height:1.65;-webkit-font-smoothing:antialiased;font-weight:400;}
    img{display:block;max-width:100%;}
    a{color:var(--ink);text-decoration:none;}
    .container{max-width:var(--maxw);margin:0 auto;padding:0 var(--space-lg);}

    h1,h2,h3{font-family:var(--font-display);font-weight:500;line-height:1.08;letter-spacing:.005em;color:var(--ink);}
    h1{font-size:clamp(2.8rem,6.5vw,5.5rem);font-weight:400;}
    h2{font-size:clamp(2rem,4.2vw,3.4rem);font-weight:400;}
    h3{font-size:clamp(1.5rem,2.4vw,2rem);font-weight:500;}
    p{font-size:1.0625rem;}
    .lead{font-size:1.25rem;line-height:1.7;font-weight:300;color:var(--text-muted);}
    .eyebrow{font-family:var(--font-body);font-size:.75rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--champagne-dk);display:inline-block;margin-bottom:1.5rem;}
    .eyebrow::before{content:"";display:inline-block;width:32px;height:1px;background:var(--champagne);vertical-align:middle;margin-right:14px;}

    .skip-link{position:absolute;left:-999px;top:0;background:var(--ink);color:#fff;padding:12px 20px;z-index:1000;}
    .skip-link:focus{left:0;}

    /* Buttons — refined, square-ish, letterspaced */
    .btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-body);font-weight:600;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;padding:18px 36px;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;transition:all .25s ease;}
    .btn-primary{background:var(--ink);color:var(--ivory);}
    .btn-primary:hover{background:var(--ink-soft);}
    .btn-gold{background:var(--champagne);color:#fff;}
    .btn-gold:hover{background:var(--champagne-dk);}
    .btn-outline{background:transparent;color:var(--ink);border-color:var(--ink);}
    .btn-outline:hover{background:var(--ink);color:var(--ivory);}
    .btn-outline-light{background:transparent;color:#fff;border-color:rgba(255,255,255,.55);}
    .btn-outline-light:hover{background:rgba(255,255,255,.12);border-color:#fff;}
    .link-arrow{font-family:var(--font-body);font-weight:600;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);display:inline-flex;align-items:center;gap:8px;border-bottom:1px solid var(--champagne);padding-bottom:4px;transition:gap .2s;}
    .link-arrow:hover{gap:14px;}

    /* ===== Header ===== */
    .topbar{background:var(--ink);color:rgba(255,255,255,.85);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;}
    .topbar .container{display:flex;justify-content:space-between;align-items:center;padding:10px var(--space-lg);gap:var(--space-md);}
    .topbar a{color:rgba(255,255,255,.85);font-weight:500;}
    .topbar a:hover{color:#fff;}
    .topbar-links{display:flex;gap:var(--space-lg);align-items:center;flex-wrap:wrap;}

    header.site{position:sticky;top:0;z-index:100;background:rgba(250,247,241,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--stone);transition:box-shadow .3s;}
    header.site.scrolled{box-shadow:0 6px 30px rgba(32,38,79,.08);}
    nav.primary{display:flex;align-items:center;justify-content:space-between;padding:1.4rem var(--space-lg);max-width:var(--maxw);margin:0 auto;gap:var(--space-md);}
    .logo{display:flex;align-items:center;gap:14px;}
    .logo-mark{width:46px;height:46px;border:1px solid var(--champagne);color:var(--ink);display:grid;place-items:center;font-family:var(--font-display);font-weight:600;font-size:1.5rem;}
    .logo-text{font-family:var(--font-display);font-weight:500;color:var(--ink);font-size:1.45rem;line-height:1;}
    .logo-text small{display:block;font-family:var(--font-body);font-size:.6rem;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:var(--champagne-dk);margin-top:5px;}

    .nav-links{display:flex;align-items:center;gap:var(--space-lg);list-style:none;}
    .nav-links>li{position:relative;}
    .nav-links>li>a,.nav-links>li>button{font-family:var(--font-body);font-weight:500;font-size:.78rem;color:var(--text);letter-spacing:.14em;text-transform:uppercase;background:none;border:none;cursor:pointer;padding:6px 0;display:inline-flex;align-items:center;gap:6px;transition:color .2s;}
    .nav-links>li>a:hover,.nav-links>li>button:hover,.nav-links a.active{color:var(--champagne-dk);}
    .dropdown{position:absolute;top:calc(100% + 14px);left:50%;transform:translateX(-50%);background:var(--cream);box-shadow:0 20px 50px rgba(32,38,79,.14);padding:14px;min-width:230px;display:none;z-index:120;border:1px solid var(--stone);}
    .dropdown.wide{min-width:480px;columns:2;column-gap:8px;}
    li.has-dropdown:hover .dropdown,li.has-dropdown:focus-within .dropdown{display:block;}
    .dropdown a{display:block;padding:9px 14px;color:var(--text);font-size:.9rem;font-weight:500;letter-spacing:0;text-transform:none;transition:all .15s;}
    .dropdown a:hover{background:var(--ivory);color:var(--champagne-dk);}
    .nav-cta{display:flex;align-items:center;gap:var(--space-md);}
    .menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:6px;}
    .menu-toggle span{display:block;width:26px;height:1.5px;background:var(--ink);margin:6px 0;}

    /* ===== Hero — full-bleed editorial ===== */
    .hero{position:relative;min-height:88vh;display:flex;align-items:flex-end;color:#fff;
      background-image:linear-gradient(to right,rgba(20,24,52,.55) 0%,rgba(20,24,52,.22) 38%,rgba(20,24,52,0) 62%),url('assets/photos/hero-home-a.jpg');
      background-size:cover;background-position:center;padding:var(--space-2xl) 0;}
    .hero-inner{max-width:760px;}
    .hero .eyebrow{color:#fff;}
    .hero .eyebrow::before{background:rgba(255,255,255,.8);}
    .hero h1{color:#fff;font-weight:400;text-shadow:0 1px 30px rgba(20,24,52,.35);}
    .hero .lead{color:#fff;font-weight:300;margin-top:1.5rem;max-width:560px;text-shadow:0 1px 20px rgba(20,24,52,.3);}
    .hero-actions{display:flex;flex-wrap:wrap;gap:1rem;margin-top:2.5rem;align-items:center;}

    /* thin credibility strip overlapping hero base */
    .credstrip{background:var(--ink);color:#fff;}
    .credstrip .container{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:var(--space-xl);padding:1.6rem var(--space-lg);text-align:center;}
    .cred{display:flex;align-items:baseline;gap:12px;}
    .cred .num{font-family:var(--font-display);font-size:2rem;font-weight:500;color:#fff;line-height:1;}
    .cred .lbl{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.7);max-width:140px;text-align:left;}
    .cred .stars{color:var(--champagne);font-size:1rem;letter-spacing:2px;}
    .cred-div{width:1px;height:38px;background:rgba(255,255,255,.2);}

    section{padding:var(--space-2xl) 0;}
    .section-head{max-width:680px;margin:0 auto var(--space-xl);text-align:center;}

    /* ===== Intro / philosophy — asymmetric ===== */
    .intro .container{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2xl);align-items:center;}
    .intro-media{position:relative;}
    .intro-media img{width:100%;height:600px;object-fit:cover;}
    .intro-media .stamp{position:absolute;bottom:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:var(--champagne);color:#fff;display:grid;place-items:center;text-align:center;font-family:var(--font-display);font-size:1.15rem;line-height:1.25;padding:24px;}
    .intro-media .stamp span{display:block;font-family:var(--font-body);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;margin-top:6px;opacity:.85;}
    .intro-copy .eyebrow{margin-bottom:1.5rem;}
    .intro-copy p{margin-top:1.5rem;color:var(--text-muted);}

    /* ===== Differentiators — editorial numbered list ===== */
    .diff{background:var(--ivory-dk);}
    .diff-list{max-width:980px;margin:0 auto;}
    .diff-row{display:grid;grid-template-columns:90px 1fr auto;gap:var(--space-lg);align-items:start;padding:var(--space-lg) 0;border-top:1px solid var(--stone);}
    .diff-row:last-child{border-bottom:1px solid var(--stone);}
    .diff-num{font-family:var(--font-display);font-size:2.6rem;font-weight:400;color:var(--champagne);line-height:1;}
    .diff-row h3{margin-bottom:.5rem;}
    .diff-row p{color:var(--text-muted);max-width:560px;}
    .diff-tag{font-family:var(--font-body);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--champagne-dk);align-self:center;white-space:nowrap;}

    /* ===== Programs — editorial cards, image-led ===== */
    .programs .section-head{text-align:left;margin-left:0;}
    .program-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-lg);}
    .program-card{background:transparent;}
    .program-card .imgwrap{overflow:hidden;}
    .program-card img{width:100%;height:340px;object-fit:cover;transition:transform .6s ease;}
    .program-card:hover img{transform:scale(1.04);}
    .program-card .age{font-family:var(--font-body);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--champagne-dk);margin:1.4rem 0 .5rem;}
    .program-card h3{margin-bottom:.6rem;}
    .program-card p{color:var(--text-muted);font-size:.98rem;margin-bottom:1.2rem;}

    /* ===== Quote — full bleed editorial ===== */
    .quote{background:var(--ink);color:#fff;text-align:center;}
    .quote .container{max-width:900px;}
    .quote .eyebrow{color:var(--champagne);}
    .quote blockquote{font-family:var(--font-display);font-size:clamp(1.8rem,3.6vw,3rem);font-weight:400;line-height:1.3;color:#fff;}
    .quote .stars{color:var(--champagne);font-size:1.1rem;letter-spacing:3px;margin:var(--space-lg) 0 .6rem;}
    .quote cite{font-style:normal;font-family:var(--font-body);font-weight:600;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;}
    .quote .sub{display:block;color:rgba(255,255,255,.6);font-size:.72rem;letter-spacing:.14em;margin-top:6px;}

    /* ===== Locate + form ===== */
    .locate{background:var(--cream);}
    .locate-wrap{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2xl);align-items:start;}
    .locate .section-head{text-align:left;margin:0 0 var(--space-lg);}
    .loc-selector label{display:block;font-family:var(--font-body);font-weight:600;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);margin-bottom:.7rem;}
    select,input{width:100%;padding:16px 18px;border:1px solid var(--stone);border-radius:var(--radius);font-family:var(--font-body);font-size:1rem;color:var(--text);background:var(--ivory);transition:border-color .2s;}
    select:focus,input:focus{outline:none;border-color:var(--champagne);}
    .loc-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:1.4rem;}
    .loc-chip{border:1px solid var(--stone);background:transparent;border-radius:var(--radius);padding:10px 18px;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--text);transition:all .2s;}

      --space-md:  1.5rem;
      --space-lg:  2.5rem;
      --space-xl:  5rem;
      --space-2xl: 7.5rem;

      --radius-sm:   3px;
      --radius-md:   6px;
      --radius-lg:   12px;
      --radius-full: 9999px;

      --shadow-xs:  0 1px 4px rgba(44,53,132,0.06);
      --shadow-sm:  0 2px 12px rgba(44,53,132,0.08);
      --shadow-md:  0 6px 28px rgba(44,53,132,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-display);
      font-size: var(--text-base);
      line-height: 1.65;
      color: var(--color-body);
      background: var(--color-white);
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    a { color: var(--color-teal); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .skip-nav {
      position: absolute; top: -100%; left: 0;
      background: var(--color-navy); color: var(--color-white);
      padding: var(--space-sm) var(--space-md);
      z-index: 999; font-weight: 600; transition: top 0.2s;
    }
    .skip-nav:focus { top: 0; }

    /* ── Typography ─────────────────────────────── */
    h1, h2, h3, h4 { font-family: var(--font-display); line-height: 1.18; }

    h1 {
      font-size: clamp(2.1rem, 5vw, 3.5rem);
      font-weight: 300;
      color: var(--color-h1);
      letter-spacing: -0.01em;
    }
    h1 strong {
      font-weight: 700;
      color: var(--color-navy);
      display: block;
    }
    h2 {
      font-size: clamp(1.5rem, 3.2vw, 2rem);
      font-weight: 700;
      color: var(--color-blue-mid);
      letter-spacing: -0.01em;
    }
    h3 {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-blue-mid);
      letter-spacing: -0.005em;
    }
    h4 {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-blue-mid);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    p { line-height: 1.75; }
    p + p { margin-top: var(--space-sm); }

    .lead {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      line-height: 1.75;
      font-weight: 300;
      color: var(--color-grey);
    }
    .eyebrow {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-gold);
      display: block;
      margin-bottom: var(--space-sm);
    }
    .section-rule {
      display: block;
      width: 40px;
      height: 2px;
      background: var(--color-baby-blue);
      margin: var(--space-md) 0;
    }
    .section-rule.center { margin: var(--space-md) auto; }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 15px 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.15s;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); text-decoration: none; }
    .btn:focus-visible { outline: 2px solid var(--color-teal); outline-offset: 3px; }

    .btn-primary {
      background: var(--color-navy);
      color: var(--color-white);
      border-color: var(--color-navy);
    }
    .btn-primary:hover {
      background: var(--color-navy-dark);
      box-shadow: 0 4px 20px rgba(44,53,132,0.3);
    }
    .btn-outline-white {
      background: transparent;
      color: var(--color-white);
      border-color: rgba(255,255,255,0.55);
    }
    .btn-outline-white:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.9);
    }
    .btn-ghost {
      background: transparent;
      color: var(--color-navy);
      border-color: var(--color-navy);
    }
    .btn-ghost:hover {
      background: var(--color-navy);
      color: var(--color-white);
    }

    /* ── Layout ──────────────────────────────────── */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 var(--space-lg);
    }
    .section         { padding: var(--space-xl) 0; }
    .section-lg      { padding: var(--space-2xl) 0; }
    .section-alt     { background: var(--color-cream); }
    .section-cream-deep { background: var(--color-cream-deep); }
    .section-navy    { background: var(--color-navy); }
    .section-baby    { background: var(--color-baby-light); }
    .text-center     { text-align: center; }

    .section-header           { margin-bottom: var(--space-xl); }
    .section-header.center    { text-align: center; }
    .section-header h2        { margin-bottom: var(--space-xs); }
    .section-header .lead     { max-width: 580px; margin-top: var(--space-sm); }
    .section-header.center .lead { margin-left: auto; margin-right: auto; }

    /* ── Header / Nav ────────────────────────────── */
    .site-header {
      background: var(--color-navy);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-lg);
      height: 76px;
      max-width: 1160px;
      margin: 0 auto;
    }
    .nav-logo { text-decoration: none; line-height: 1; }
    .nav-logo-name {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-white);
      letter-spacing: 0.05em;
      display: block;
    }
    .nav-logo-tagline {
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--color-baby-blue);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      list-style: none;
    }
    .nav-links a {
      font-size: var(--text-xs);
      font-weight: 600;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--color-baby-blue); text-decoration: none; }
    .nav-cta { padding: 10px 22px !important; font-size: var(--text-xs) !important; }

    .nav-toggle {
      display: none; background: none; border: none;
      cursor: pointer; padding: 8px; color: var(--color-white);
    }
    .nav-toggle svg { width: 22px; height: 22px; }

    @media (max-width: 768px) {
      .nav-toggle { display: flex; }
      .nav-links {
        display: none;
        position: absolute; top: 76px; left: 0; right: 0;
        background: var(--color-navy-dark);
        flex-direction: column; align-items: flex-start;
        gap: 0; padding: var(--space-md) 0;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      .nav-links.open { display: flex; }
      .nav-links li { width: 100%; }
      .nav-links a { display: block; padding: 14px var(--space-lg); border-bottom: 1px solid rgba(255,255,255,0.06); }
      .nav-links .btn { margin: var(--space-md) var(--space-lg); width: calc(100% - 5rem); justify-content: center; }
    }

    /* ── Hero ────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 680px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/photos/hero-home-b.jpg');
      background-size: cover;
      background-position: center 42%;
      transform: scale(1.03);
      transition: transform 8s ease-out;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        rgba(30, 36, 96, 0.88) 0%,
        rgba(30, 36, 96, 0.68) 45%,
        rgba(30, 36, 96, 0.22) 100%
      );
    }
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 620px;
      padding: var(--space-2xl) var(--space-lg);
    }
    .hero-content .eyebrow { color: var(--color-baby-blue); opacity: 0.9; }
    .hero h1 {
      color: rgba(255,255,255,0.92);
      font-size: clamp(2.2rem, 5.5vw, 3.6rem);
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: var(--space-md);
    }
    .hero h1 strong {
      font-weight: 700;
      color: var(--color-white);
      display: inline;
    }
    .hero h1 em {
      font-style: italic;
      font-family: var(--font-serif);
      color: var(--color-baby-blue);
      font-weight: 400;
    }
    .hero-sub {
      font-size: var(--text-base);
      color: rgba(255,255,255,0.78);
      line-height: 1.8;
      margin-bottom: var(--space-lg);
      font-weight: 300;
      max-width: 480px;
    }
    .hero-actions { display: flex; gap: var(--space-md); flex-wrap: wrap; }
    .hero-actions .btn { padding: 16px 36px; font-size: var(--text-sm); }

    /* ── Credential Strip ────────────────────────── */
    .cred-strip {
      background: var(--color-white);
      border-bottom: 1px solid #ebebeb;
      padding: 20px 0;
    }
    .cred-strip-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xl);
      flex-wrap: wrap;
    }
    .cred-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cred-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      color: var(--color-blue-mid);
    }
    .cred-text-main {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-body);
      display: block;
      line-height: 1.2;
    }
    .cred-text-sub {
      font-size: var(--text-xs);
      color: var(--color-grey);
      font-weight: 400;
    }
    .cred-stars {
      color: #d4a32a;
      font-size: 0.85rem;
      letter-spacing: 2px;
      display: block;
    }
    .cred-divider { width: 1px; height: 36px; background: #e4e4e4; }

    /* ── Stat Columns ────────────────────────────── */
    .stat-band {
      background: var(--color-cream);
      padding: var(--space-lg) 0;
      border-top: 1px solid #e8e4dc;
      border-bottom: 1px solid #e8e4dc;
    }
    .stat-columns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      text-align: center;
    }
    .stat-col {
      padding: var(--space-lg) var(--space-md);
      border-right: 1px solid #e0dbd3;
    }
    .stat-col:last-child { border-right: none; }
    .stat-number {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      color: var(--color-navy);
      line-height: 1;
      display: block;
      letter-spacing: -0.02em;
    }
    .stat-number sup {
      font-size: 0.45em;
      vertical-align: super;
      font-weight: 600;
      color: var(--color-blue-mid);
    }
    .stat-label {
      font-size: var(--text-xs);
      color: var(--color-grey);
      font-weight: 400;
      margin-top: 6px;
      letter-spacing: 0.04em;
      display: block;
      line-height: 1.5;
    }

    /* ── Differentiators ─────────────────────────── */
    .diff-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: #e8e4dc;
      border: 1px solid #e8e4dc;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-top: var(--space-xl);
    }
    .diff-card {
      background: var(--color-white);
      padding: var(--space-lg) var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      transition: background 0.2s;
    }
    .diff-card:hover { background: var(--color-cream); }
    .diff-icon-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: 4px;
    }
    .diff-svg {
      width: 28px;
      height: 28px;
      color: var(--color-teal);
      flex-shrink: 0;
    }
    .diff-tag {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-gold);
    }
    .diff-card h3 {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-navy);
      line-height: 1.3;
      margin: 0;
    }
    .diff-card p {
      font-size: var(--text-sm);
      color: var(--color-grey);
      line-height: 1.7;
      margin: 0;
      font-weight: 300;
    }

    /* ── Programs ────────────────────────────────── */
    .programs-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-md);
      margin-top: var(--space-xl);
    }
    .program-card {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-xs);
      text-align: center;
      transition: box-shadow 0.22s, transform 0.22s;
      border: 1px solid #ebe8e2;
    }
    .program-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
    .program-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
    .program-body { padding: var(--space-md) var(--space-sm); border-top: 2px solid var(--color-baby-blue); }
    .program-body h3 { font-size: var(--text-sm); font-weight: 700; color: var(--color-blue-mid); letter-spacing: 0.03em; }
    .program-body p { font-size: var(--text-xs); color: var(--color-grey); margin-top: 4px; font-weight: 300; }

    /* ── Enrichment ──────────────────────────────── */
    .enrichment-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: #e8e4dc;
      border: 1px solid #e8e4dc;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-top: var(--space-xl);
    }
    .enrichment-cell {
      background: var(--color-white);
      padding: var(--space-lg) var(--space-md);
      text-align: center;
      transition: background 0.2s;
    }
    .enrichment-cell:hover { background: var(--color-cream); }
    .enrichment-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto var(--space-md);
      color: var(--color-navy);
    }
    .enrichment-cell h4 {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-navy);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .enrichment-cell p {
      font-size: var(--text-xs);
      color: var(--color-grey);
      line-height: 1.55;
      font-weight: 300;
    }

    /* ── Testimonials ────────────────────────────── */
    .testimonial-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-lg);
      margin-top: var(--space-xl);
    }
    .testimonial-card {
      padding: var(--space-lg);
      border-top: 1px solid #ddd;
      position: relative;
    }
    .testimonial-open-mark {
      font-family: var(--font-serif);
      font-size: 4.5rem;
      line-height: 0.6;
      color: var(--color-baby-blue);
      opacity: 0.6;
      display: block;
      margin-bottom: var(--space-sm);
    }
    .testimonial-stars { color: #c8972a; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: var(--space-md); display: block; }
    .testimonial-text {
      font-family: var(--font-serif);
      font-size: var(--text-base);
      line-height: 1.8;
      color: var(--color-body);
      font-style: italic;
      margin-bottom: var(--space-lg);
    }
    .testimonial-author { display: flex; align-items: center; gap: 12px; }
    .testimonial-monogram {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--color-baby-blue);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--color-blue-mid);
      font-size: var(--text-xs);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .testimonial-name { font-weight: 700; font-size: var(--text-xs); color: var(--color-body); display: block; letter-spacing: 0.04em; }
    .testimonial-location { font-size: var(--text-xs); color: var(--color-grey); font-weight: 300; }

    /* ── Pull Quote (inline) ─────────────────────── */
    .pull-quote-wrap { padding: var(--space-xl) 0; }
    .pull-quote {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
      padding: 0 var(--space-lg);
    }
    .pull-quote-text {
      font-family: var(--font-serif);
      font-size: clamp(1.15rem, 2.5vw, 1.45rem);
      font-style: italic;
      line-height: 1.75;
      color: var(--color-body);
      margin-bottom: var(--space-md);
    }
    .pull-quote-cite {
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-grey);
    }
    .pull-quote-rule {
      width: 36px;
      height: 1px;
      background: var(--color-baby-blue);
      display: block;
      margin: var(--space-md) auto;
    }

    /* ── About ───────────────────────────────────── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2xl);
      align-items: center;
    }
    .about-image-wrap { position: relative; }
    .about-image {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      border-radius: var(--radius-lg);
    }
    .about-badge {
      position: absolute;
      bottom: var(--space-md);
      left: var(--space-md);
      background: var(--color-white);
      border-left: 3px solid var(--color-gold);
      padding: 12px 18px;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      box-shadow: var(--shadow-sm);
    }
    .about-badge-label { font-size: var(--text-xs); font-weight: 700; color: var(--color-navy); letter-spacing: 0.06em; text-transform: uppercase; }
    .about-badge-sub { font-size: var(--text-xs); color: var(--color-grey); font-weight: 300; }

    /* ── Locations ───────────────────────────────── */
    .location-section { background: var(--color-navy); padding: var(--space-xl) 0; }
    .location-section h2 { color: var(--color-white); }
    .location-section .lead { color: rgba(255,255,255,0.65); }
    .location-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-sm);
      margin-top: var(--space-xl);
    }
    .location-card {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-decoration: none;
      display: block;
      transition: background 0.18s, border-color 0.18s;
    }
    .location-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(146,197,234,0.5); text-decoration: none; }
    .location-card h3 { font-size: var(--text-sm); font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 3px; letter-spacing: 0.02em; }
    .location-card p { font-size: var(--text-xs); color: rgba(255,255,255,0.45); margin: 0; font-weight: 300; }
    .location-card .loc-arrow { display: block; color: var(--color-baby-blue); font-size: var(--text-sm); margin-top: 10px; opacity: 0.7; }
    .location-card.featured { background: rgba(146,197,234,0.1); border-color: rgba(146,197,234,0.35); }
    .location-card.featured h3 { color: var(--color-baby-blue); }

    /* ── CTA ─────────────────────────────────────── */
    .cta-section { padding: var(--space-2xl) 0; text-align: center; background: var(--color-cream-deep); }
    .cta-section h2 { color: var(--color-navy); margin-bottom: var(--space-xs); }
    .cta-section .lead { margin: var(--space-sm) auto var(--space-lg); max-width: 520px; }
    .cta-actions { display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap; }

    /* ── Footer ──────────────────────────────────── */
    footer {
      background: var(--color-navy-dark);
      color: rgba(255,255,255,0.6);
      padding: var(--space-xl) 0 var(--space-lg);
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: var(--space-xl);
      padding-bottom: var(--space-xl);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .footer-logo-name { font-size: var(--text-lg); font-weight: 700; color: var(--color-white); display: block; letter-spacing: 0.05em; }
    .footer-logo-tag { font-size: 0.65rem; font-weight: 300; color: var(--color-baby-blue); letter-spacing: 0.22em; text-transform: uppercase; display: block; margin-bottom: var(--space-md); }
    .footer-brand p { font-size: var(--text-sm); line-height: 1.75; margin-bottom: var(--space-md); font-weight: 300; }
    .footer-col h4 { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: var(--space-md); }
    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 10px; }
    .footer-col a { font-size: var(--text-sm); color: rgba(255,255,255,0.6); font-weight: 300; transition: color 0.15s; }

    close.addEventListener('click',closeDrawer);
    drawer.addEventListener('click',e=>{if(e.target===drawer)closeDrawer();});
    drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click',closeDrawer));

    // Rotating hero captions (CSG-style supporting lines)
    const cap=document.getElementById('heroCaption');
    const lines=["Where every day begins with care.","Organic meals, made fresh in-house.","A full week of enrichment, included.","Smaller classes. Closer attention.","Family-owned for three generations."];
    let ci=0;

        cap.classList.remove('show');
        setTimeout(()=>{ci=(ci+1)%lines.length;cap.textContent=lines[ci];cap.classList.add('show');},1000);
      },5000);

    .diff-svg { width: 26px; height: 26px; color: var(--color-teal); flex-shrink: 0; }

    /* ── Enrichment ──────────────────────────────── */

      display: grid;
      grid-template-columns: repeat(5, 1fr);

      overflow: hidden;

      padding: var(--space-lg) var(--space-md);
      text-align: center;
      transition: background 0.2s;

    .enrichment-icon { width: 48px; height: 48px; margin: 0 auto var(--space-md); color: var(--color-navy); }
    .enrichment-cell h4 { font-size: var(--text-xs); font-weight: 700; color: var(--color-navy); letter-spacing: 0.1em; margin-bottom: 6px; }
    .enrichment-cell p { font-size: var(--text-xs); color: var(--color-grey); line-height: 1.55; font-weight: 300; }

    /* ── Testimonials ────────────────────────────── */
    .testimonial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-lg); margin-top: var(--space-xl); }
    .testimonial-card { padding: var(--space-lg); border-top: 1px solid #ddd; }
    .testimonial-open-mark { font-family: var(--font-serif); font-size: 4rem; line-height: 0.6; color: var(--color-baby-blue); opacity: 0.55; display: block; margin-bottom: var(--space-sm); }

    .testimonial-text { font-family: var(--font-serif); font-size: var(--text-base); line-height: 1.8; color: var(--color-body); font-style: italic; margin-bottom: var(--space-lg); }
    .testimonial-author { display: flex; align-items: center; gap: 12px; }
    .testimonial-monogram { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--color-baby-blue); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--color-blue-mid); font-size: var(--text-xs); letter-spacing: 0.05em; flex-shrink: 0; }
    .testimonial-name { font-weight: 700; font-size: var(--text-xs); color: var(--color-body); display: block; letter-spacing: 0.04em; }
    .testimonial-location { font-size: var(--text-xs); color: var(--color-grey); font-weight: 300; }

    /* ── Pull Quote ──────────────────────────────── */
    .pull-quote-wrap { padding: var(--space-xl) 0; }
    .pull-quote { max-width: 720px; margin: 0 auto; text-align: center; padding: 0 var(--space-lg); }
    .pull-quote-text { font-family: var(--font-serif); font-size: clamp(1.1rem, 2.2vw, 1.35rem); font-style: italic; line-height: 1.8; color: var(--color-body); margin-bottom: var(--space-md); }
    .pull-quote-cite { font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-grey); }
    .pull-quote-rule { width: 36px; height: 1px; background: var(--color-baby-blue); display: block; margin: var(--space-md) auto; }

    /* ── Director ────────────────────────────────── */
    .director-grid { display: grid; grid-template-columns: 320px 1fr; gap: var(--space-2xl); align-items: start; }
    .director-photo-wrap { position: relative; }
    .director-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: var(--radius-lg); }
    .director-badge {
      position: absolute; bottom: var(--space-md); left: 0; right: 0;
      margin: 0 var(--space-md);
      background: var(--color-white);
      border-left: 3px solid var(--color-gold);

      box-shadow: var(--shadow-sm);

    .director-badge-name { font-size: var(--text-sm); font-weight: 700; color: var(--color-navy); display: block; }
    .director-badge-title { font-size: var(--text-xs); color: var(--color-grey); font-weight: 300; }
    .credentials-list { display: flex; flex-direction: column; gap: 12px; margin: var(--space-lg) 0; }
    .credential-item { display: flex; align-items: center; gap: 14px; }
    .credential-icon { width: 32px; height: 32px; color: var(--color-teal); flex-shrink: 0; }
    .credential-text { font-size: var(--text-sm); color: var(--color-body); font-weight: 300; }

    /* ── Location Info ───────────────────────────── */
    .location-strip { background: var(--color-navy); padding: var(--space-xl) 0; }
    .location-strip h2 { color: var(--color-white); text-align: center; margin-bottom: var(--space-xl); }
    .location-info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xl); }
    .location-info-block h3 { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-baby-blue); opacity: 0.8; margin-bottom: var(--space-md); }
    .location-info-block p { font-size: var(--text-sm); color: rgba(255,255,255,0.7); line-height: 1.75; font-weight: 300; }
    .location-info-block a { color: var(--color-baby-blue); font-size: var(--text-sm); }
    .location-info-block a:hover { text-decoration: underline; }
    .map-link {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: var(--space-md);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      font-size: var(--text-xs); font-weight: 600; color: rgba(255,255,255,0.6);
      letter-spacing: 0.06em; text-transform: uppercase;

    }
    .map-link:hover { background: rgba(255,255,255,0.07); border-color: rgba(146,197,234,0.4); color: var(--color-baby-blue); text-decoration: none; }
    .map-link svg { width: 16px; height: 16px; }

    /* ── CTA ─────────────────────────────────────── */
    .cta-section { padding: var(--space-2xl) 0; text-align: center; background: var(--color-cream-deep); }
    .cta-section h2 { color: var(--color-navy); margin-bottom: var(--space-xs); }
    .cta-section .lead { margin: var(--space-sm) auto var(--space-lg); max-width: 500px; }
    .cta-actions { display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap; }

    /* ── Footer ──────────────────────────────────── */
    footer { background: var(--color-navy-dark); color: rgba(255,255,255,0.6); padding: var(--space-xl) 0 var(--space-lg); }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: var(--space-xl); padding-bottom: var(--space-xl); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .footer-logo-name { font-size: var(--text-lg); font-weight: 700; color: var(--color-white); display: block; letter-spacing: 0.05em; }
    .footer-logo-location { font-size: 0.65rem; font-weight: 300; color: var(--color-baby-blue); letter-spacing: 0.18em; text-transform: uppercase; display: block; margin-bottom: var(--space-md); }
    .footer-brand p { font-size: var(--text-sm); line-height: 1.75; margin-bottom: var(--space-sm); font-weight: 300; }
    .footer-col h4 { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.45); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: var(--space-md); }
    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 10px; }
    .footer-col a { font-size: var(--text-sm); color: rgba(255,255,255,0.55); font-weight: 300; transition: color 0.15s; }
    .footer-col a:hover { color: var(--color-baby-blue); text-decoration: none; }
    .footer-bottom { padding-top: var(--space-lg); display: flex; justify-content: space-between; align-items: center; font-size: var(--text-xs); flex-wrap: wrap; gap: var(--space-sm); }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 1024px) {
      .hero-split { grid-template-columns: 1fr 380px; }
      .diff-grid { grid-template-columns: repeat(2, 1fr); }
      .enrichment-strip { grid-template-columns: repeat(3, 1fr); }
      .director-grid { grid-template-columns: 260px 1fr; gap: var(--space-xl); }
      .location-info-grid { grid-template-columns: repeat(2, 1fr); }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: var(--space-lg); }
    }
    @media (max-width: 768px) {
      :root { --space-xl: 3.5rem; --space-2xl: 5rem; }
      .hero-split { grid-template-columns: 1fr; }
      .hero-photo { min-height: 440px; padding: var(--space-xl) var(--space-md); }
      .hero-form-panel { padding: var(--space-lg) var(--space-md); }
      .diff-grid { grid-template-columns: 1fr; }
      .enrichment-strip { grid-template-columns: repeat(2, 1fr); }
      .testimonial-grid { grid-template-columns: 1fr; }
      .director-grid { grid-template-columns: 1fr; }
      .director-photo-wrap { max-width: 320px; }
      .location-info-grid { grid-template-columns: 1fr; gap: var(--space-lg); }
      .footer-grid { grid-template-columns: 1fr; }
      .cred-strip-inner { gap: var(--space-lg); }
      .cred-divider { display: none; }
      .container { padding: 0 var(--space-md); }
    }
    @media (max-width: 480px) {
      .enrichment-strip { grid-template-columns: repeat(2, 1fr); }
      .hero-btns { flex-direction: column; }
      .hero-btns .btn { justify-content: center; }
      .cta-actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>

  <script>
  (function(){
    var CONCEPTS = {
      'home-v22':{page:'home',srcId:'src-home-v22',label:'Editorial / Warm',tag:'V2.2',dir:'A',note:'Cormorant serif + ivory/champagne. Departs from Brand Book typeface & palette.'},
      'home-v24':{page:'home',srcId:'src-home-v24',label:'Brand-Faithful / Navy',tag:'V2.4',dir:'B',note:'Raleway + Brand Book navy/teal. Most complete homepage; on-brand.'},
      'home-v25':{page:'home',srcId:'src-home-v25',label:'Editorial / Video',tag:'V2.5',dir:'A',note:'Direction A with autoplay video hero (placeholder b-roll). Departs from Brand Book.'},
      'jerome-v21':{page:'jerome',srcId:'src-jerome-v21',label:'Editorial / Warm',tag:'V2.1',dir:'A',note:'Editorial split hero, director quote, map + form. Departs from Brand Book.'},
      'jerome-v22':{page:'jerome',srcId:'src-jerome-v22',label:'Brand-Faithful / Navy',tag:'V2.2',dir:'B',note:'Hero with inline tour form; Brand Book palette. On-brand.'}
    };
    var ORDER = {home:['home-v22','home-v24','home-v25'], jerome:['jerome-v21','jerome-v22']};
    var VP = {desktop:{w:null,label:'Desktop'}, tablet:{w:768,label:'Tablet'}, mobile:{w:390,label:'Mobile'}};
    var DEFAULT = 'home-v24';

    // Locked pairings: switching page type preserves the design direction (A<->A, B<->B).
    // Tracks the last variant viewed per page+direction so round-trips feel natural.
    var PAIR = {'home|A':'home-v22','home|B':'home-v24','jerome|A':'jerome-v21','jerome|B':'jerome-v22'};
    function remember(id){ var c=CONCEPTS[id]; PAIR[c.page+'|'+c.dir]=id; }
    function counterpart(id){ var c=CONCEPTS[id]; var other=(c.page==='home')?'jerome':'home'; return PAIR[other+'|'+c.dir]; }

    var stage=document.getElementById('stage'), device=document.getElementById('device'),
        view=document.getElementById('view'), chips=document.getElementById('chips'),
        note=document.getElementById('note'), dims=document.getElementById('dims'),
        pageTabs=document.getElementById('pageTabs'), vpTabs=document.getElementById('vpTabs');

    var state={concept:DEFAULT, vp:'desktop'};
    var loaded=null;        // which concept is currently in the iframe
    var blobUrl=null;

    function html(id){
      var el=document.getElementById(CONCEPTS[id].srcId);
      return el.textContent.replaceAll('<\\/script>','<\/script>');
    }

    function parseHash(){
      var h=(location.hash||'').replace(/^#/,'');
      if(!h) return;
      var parts=h.split('/');
      if(CONCEPTS[parts[0]]) state.concept=parts[0];
      if(parts[1]&&VP[parts[1]]) state.vp=parts[1];
    }
    function writeHash(){
      var nh='#'+state.concept+'/'+state.vp;
      if(location.hash!==nh) history.replaceState(null,'',nh);
    }

    function renderChips(page){
      chips.innerHTML='';
      ORDER[page].forEach(function(id){
        var c=CONCEPTS[id];
        var b=document.createElement('button');
        b.className='chip'; b.setAttribute('aria-pressed', id===state.concept?'true':'false');
        b.innerHTML='<span class="dot '+c.dir+'"></span>'+c.label+' <span class="tag">'+c.tag+'</span>';
        b.addEventListener('click',function(){ select(id); });
        chips.appendChild(b);
      });
    }

    function renderPageTabs(page){
      Array.prototype.forEach.call(pageTabs.children,function(t){
        t.setAttribute('aria-selected', t.dataset.page===page?'true':'false');
      });
    }
    function renderVpTabs(){
      Array.prototype.forEach.call(vpTabs.children,function(t){
        var on=t.dataset.vp===state.vp;
        t.classList.toggle('active',on); t.setAttribute('aria-pressed',on?'true':'false');
      });
    }

    function applyViewport(){
      var v=VP[state.vp];
      if(v.w){ stage.classList.add('framed'); device.style.width=v.w+'px'; }
      else { stage.classList.remove('framed'); device.style.width='100%'; }
      dims.textContent = v.w ? (v.w+' px · '+v.label) : '';
      renderVpTabs();
    }

    function loadConcept(){
      if(loaded===state.concept) return;
      view.srcdoc = html(state.concept);
      loaded=state.concept;
    }

    function render(){
      remember(state.concept);
      var cur=CONCEPTS[state.concept], page=cur.page;
      renderPageTabs(page);
      renderChips(page);
      var cp=CONCEPTS[counterpart(state.concept)];
      var cpPage=(cp.page==='home')?'Homepage':'Jerome';
      note.innerHTML='<span class="badge '+cur.dir+'">'+(cur.dir==='B'?'On-brand':'Editorial')+'</span>'+cur.note
        +'<span class="pair"><span class="lk">Paired</span> <b>'+cpPage+' · '+cp.label+'</b> '+cp.tag+'</span>';
      applyViewport();
      loadConcept();
      writeHash();
    }

    function select(id){ if(!CONCEPTS[id])return; state.concept=id; render(); }
    // Page switch keeps the current direction and lands on its paired concept (locked association).
    function selectPage(page){ if(CONCEPTS[state.concept].page===page)return; state.concept=PAIR[page+'|'+CONCEPTS[state.concept].dir]; render(); }
    function selectVp(vp){ if(!VP[vp])return; state.vp=vp; applyViewport(); writeHash(); }

    Array.prototype.forEach.call(pageTabs.children,function(t){ t.addEventListener('click',function(){selectPage(t.dataset.page);}); });
    Array.prototype.forEach.call(vpTabs.children,function(t){ t.addEventListener('click',function(){selectVp(t.dataset.vp);}); });

    document.getElementById('openTab').addEventListener('click',function(){
      if(blobUrl) URL.revokeObjectURL(blobUrl);
      // Inject a <base> so the popped-out concept's relative asset paths (logos/photos) resolve.
      var u=location.href.split('#')[0].split('?')[0];
      var dir=u.substring(0,u.lastIndexOf('/')+1);
      var doc=html(state.concept).replace(/<head>/i,'<head><base href="'+dir+'">');
      blobUrl=URL.createObjectURL(new Blob([doc],{type:'text/html'}));
      window.open(blobUrl,'_blank','noopener');
    });

    window.addEventListener('hashchange',function(){ parseHash(); render(); });

    parseHash();
    render();
  })();
  </script>
